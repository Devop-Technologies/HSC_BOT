name: Deploy HSC Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to HSC VM (staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 20.21.104.27
          username: azureuser
          key: ${{ secrets.HSC_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/Healing_Space_Center
            git pull origin main
            npm install --production
            pm2 restart hsc-bot
            echo 'Deployment complete'
